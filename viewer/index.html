<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRE Buddy — Scenario Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <header>
    <h1>PRE Buddy <span class="tag">Scenario Viewer</span></h1>
    <div class="header-meta">
      <span id="meta-character">character: —</span>
      <span id="meta-severity">severity: —</span>
      <span id="meta-step">step: 0 / 0</span>
    </div>
  </header>

  <main>
    <section class="stage" aria-label="Robot stage">
      <div class="robot" id="robot">
        <div class="robot-shadow"></div>
        <div class="robot-head" id="robot-head">
          <div class="robot-led" id="robot-led" aria-hidden="true"></div>
          <svg class="robot-face" id="robot-face" viewBox="0 0 100 80" aria-hidden="true">
            <!-- Eyes + brows + mouth are redrawn per (character, expression) by viewer.js. -->
          </svg>
          <div class="robot-face-fallback" hidden>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
          </div>
        </div>
        <div class="robot-base"></div>
      </div>
      <div class="stage-readout">
        <div class="readout-row"><span class="label">event</span> <span id="rd-event">—</span></div>
        <div class="readout-row"><span class="label">note</span> <span id="rd-note">—</span></div>
        <div class="readout-row"><span class="label">led</span> <span id="rd-led" class="led-chip">—</span></div>
        <div class="readout-row"><span class="label">face</span> <span id="rd-face">—</span></div>
        <div class="readout-row"><span class="label">head</span> <span id="rd-head">x=0° y=45°</span></div>
        <div class="readout-row"><span class="label">duration</span> <span id="rd-duration">—</span></div>
      </div>
    </section>

    <section class="controls">
      <div class="transport">
        <button id="btn-prev" title="Previous step">◀</button>
        <button id="btn-playpause" title="Play / Pause">▶</button>
        <button id="btn-next" title="Next step">▶|</button>
        <button id="btn-reset" title="Reset">⟲</button>
        <label class="speed">
          speed
          <select id="speed-select">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
            <option value="0">instant</option>
          </select>
        </label>
      </div>
      <input type="range" id="scrubber" min="0" max="0" value="0" step="1">
    </section>

    <section class="loader">
      <div class="loader-row">
        <label class="file-pick">
          <input type="file" id="file-input" accept=".json,application/json">
          <span>Load timeline JSON…</span>
        </label>
        <button id="btn-paste-toggle">Paste JSON</button>
        <button id="btn-load-demo">Load built-in demo</button>
      </div>
      <textarea id="paste-area" placeholder='Paste the output of `pre-buddy simulate --format json ...` here' hidden></textarea>
      <p class="hint">
        Generate a timeline with:
        <code>pre-buddy simulate --playback scenario.jsonl --format json --out timeline.json</code>
      </p>
    </section>

    <section class="log" aria-label="Event log">
      <h2>Timeline</h2>
      <ol id="event-log"></ol>
    </section>
  </main>

  <script src="viewer.js"></script>
</body>
</html>
